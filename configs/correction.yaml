# P3 current contract config.
# This project currently targets HF Transformers Whisper artifacts.
runtime:
  asr: hf-transformers

backend:
  name: pynini
  available: false
  fail_fast: true
  fallback: null
  blocker: "ModuleNotFoundError: No module named 'pynini'"

safety:
  domain_gate_enabled: true
  margin: 0.25
  free_talk_allowed_correction_rate: 0.0

calibration:
  selected_config_id: safe_only_margin_025
  lambda_weight: 1.0
  rule_policy: safe_only
  domain_gate_policy: script_span_only
  correction_cost: 1.0
  keep_cost: 0.0

rules:
  path: data/correction_rules.csv
  reserved_context_fields:
    left_context: reject_non_empty
    right_context: reject_non_empty

artifact:
  duplicate_hypothesis_key: normalized_text
  duplicate_tiebreak:
    - lowest_asr_cost
    - lowest_rank
